{% extends 'base.html' %}

{% block title %}ثبت‌نام در نرسیمد{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2>ثبت‌نام در نرسیمد</h2>
        {% if error %}
        <div style="background: var(--danger-color); color: white; padding: 1rem; border-radius: 5px; margin-bottom: 1rem;">
            {{ error }}
        </div>
        {% endif %}
        <form method="post" data-validate>
            {% csrf_token %}
            <div class="form-group">
                <label for="username">نام کاربری *</label>
                <input type="text" id="username" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="email">ایمیل *</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">رمز عبور *</label>
                <input type="password" id="password" name="password" class="form-control" required minlength="8">
            </div>
            <div class="form-group">
                <label for="password_confirm">تکرار رمز عبور *</label>
                <input type="password" id="password_confirm" name="password_confirm" class="form-control" required minlength="8">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">ثبت‌نام</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem;">
            قبلاً ثبت‌نام کرده‌اید؟ <a href="{% url 'login' %}" style="color: var(--primary-color);">وارد شوید</a>
        </p>
    </div>
</div>
{% endblock %}
