{% extends 'base.html' %}

{% block title %}ورود به نرسیمد{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2>ورود به حساب کاربری</h2>
        {% if error %}
        <div style="background: var(--danger-color); color: white; padding: 1rem; border-radius: 5px; margin-bottom: 1rem;">
            {{ error }}
        </div>
        {% endif %}
        <form method="post" data-validate>
            {% csrf_token %}
            <div class="form-group">
                <label for="username">نام کاربری</label>
                <input type="text" id="username" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">رمز عبور</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">ورود</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem;">
            حساب کاربری ندارید؟ <a href="{% url 'register' %}" style="color: var(--primary-color);">ثبت‌نام کنید</a>
        </p>
    </div>
</div>
{% endblock %}
