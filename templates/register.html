<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نام - نرسیمد</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>نرسیمد</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="/">خانه</a></li>
                    <li><a href="/articles.html">مقالات</a></li>
                    <li><a href="/store.html">فروشگاه</a></li>
                    <li><a href="/about.html">درباره ما</a></li>
                    <li><a href="/contact.html">تماس با ما</a></li>
                    <li><a href="/team.html">اعضای تیم</a></li>
                </ul>
            </nav>
            <div class="auth-buttons">
                <a href="/login.html" class="btn-login">ورود</a>
                <a href="/register.html" class="btn-register">ثبت نام</a>
            </div>
        </div>
    </header>

    <main>
        <div class="form-container">
            <h2 style="text-align: center; color: #396cf0; margin-bottom: 2rem;">ثبت نام در نرسیمد</h2>
            <form id="registerForm" onsubmit="return validateForm('registerForm')">
                <div class="form-group">
                    <label for="first_name">نام *</label>
                    <input type="text" id="first_name" name="first_name" required>
                </div>

                <div class="form-group">
                    <label for="last_name">نام خانوادگی *</label>
                    <input type="text" id="last_name" name="last_name" required>
                </div>

                <div class="form-group">
                    <label for="email">ایمیل *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="username">نام کاربری *</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">رمز عبور *</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password">تکرار رمز عبور *</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </div>

                <button type="submit" class="btn-submit">ثبت نام</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; color: #666;">
                قبلاً ثبت نام کرده‌اید؟ 
                <a href="/login.html" style="color: #396cf0; text-decoration: none;">وارد شوید</a>
            </p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>تمامی حقوق برای نرسیمد محفوظ است © ۱۴۰۳</p>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
