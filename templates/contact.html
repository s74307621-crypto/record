<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تماس با ما - نرسیمد</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container nav-container">
            <a href="/" class="logo"><div class="logo-icon">🏥</div><span>نرسیمد</span></a>
            <nav><ul class="nav-menu">
                <li><a href="/" class="nav-link">خانه</a></li>
                <li><a href="/shop" class="nav-link">فروشگاه</a></li>
                <li><a href="/articles" class="nav-link">مقالات</a></li>
                <li><a href="/about" class="nav-link">درباره ما</a></li>
                <li><a href="/contact" class="nav-link active">تماس با ما</a></li>
                <li><a href="/team" class="nav-link">اعضای تیم</a></li>
            </ul></nav>
            <div style="display:flex;align-items:center;gap:15px">
                <div class="cart-icon-wrapper"><span class="cart-icon">🛒</span><span class="cart-badge" style="display:none">0</span></div>
                <div class="auth-buttons"><a href="/login" class="btn btn-outline">ورود</a><a href="/register" class="btn btn-primary">ثبت نام</a></div>
            </div>
        </div>
    </header>

    <section class="contact-section">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-info">
                    <h2>ارتباط با ما</h2>
                    <p>برای سوالات و پیشنهادات خود می‌توانید از طریق فرم زیر با ما در ارتباط باشید.</p>
                    
                    <div class="contact-details">
                        <div class="contact-item">
                            <div class="contact-icon">📍</div>
                            <div class="contact-text"><strong>آدرس:</strong><span>تهران، ایران</span></div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">📧</div>
                            <div class="contact-text"><strong>ایمیل:</strong><span>info@nursimed.ir</span></div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">📞</div>
                            <div class="contact-text"><strong>تلفن:</strong><span>۰۲۱-۱۲۳۴۵۶۷۸</span></div>
                        </div>
                    </div>
                </div>
                
                <div class="form-container" style="margin:0;max-width:100%">
                    <form id="contactForm">
                        <div class="form-group">
                            <label class="form-label">نام</label>
                            <input type="text" id="name" class="form-input" placeholder="نام خود را وارد کنید" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">ایمیل</label>
                            <input type="email" id="email" class="form-input" placeholder="example@gmail.com" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">موضوع</label>
                            <input type="text" id="subject" class="form-input" placeholder="موضوع پیام">
                        </div>
                        <div class="form-group">
                            <label class="form-label">پیام</label>
                            <textarea id="message" class="form-input" rows="5" placeholder="پیام خود را بنویسید..." required style="resize:vertical"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary form-btn">ارسال پیام</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer"><div class="container"><div class="footer-bottom"><p>© ۱۴۰۳ نرسیمد</p></div></div></footer>
    <div class="toast-container"></div>
    <script src="/static/js/main.js"></script>
</body>
</html>
