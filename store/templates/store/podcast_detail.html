{% extends 'base.html' %}

{% block title %}{{ podcast.title }}{% endblock %}

{% block content %}
<section class="hero" style="padding: 3rem 0;">
    <div class="container">
        <h1>{{ podcast.title }}</h1>
    </div>
</section>

<section>
    <div class="container">
        <div class="product-detail">
            <div>
                {% if podcast.image %}
                <img src="{{ podcast.image.url }}" alt="{{ podcast.title }}" class="product-image">
                {% endif %}
            </div>
            <div class="product-info">
                <h1 style="color: var(--primary-color);">{{ podcast.title }}</h1>
                <p style="line-height: 1.8;">{{ podcast.description }}</p>
                <div class="product-meta">
                    <div>
                        <strong>مدت زمان:</strong>
                        <span>{{ podcast.duration }}</span>
                    </div>
                </div>
                <audio controls style="width: 100%; margin-top: 1rem;">
                    <source src="{{ podcast.audio_file.url }}" type="audio/mpeg">
                    مرورگر شما از پخش صدا پشتیبانی نمی‌کند.
                </audio>
            </div>
        </div>
    </div>
</section>
{% endblock %}
