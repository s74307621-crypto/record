{% extends 'base.html' %}

{% block title %}{{ course.title }}{% endblock %}

{% block content %}
<section class="hero" style="padding: 3rem 0;">
    <div class="container">
        <h1>{{ course.title }}</h1>
    </div>
</section>

<section>
    <div class="container">
        <div class="product-detail">
            <div>
                {% if course.image %}
                <img src="{{ course.image.url }}" alt="{{ course.title }}" class="product-image">
                {% endif %}
            </div>
            <div class="product-info">
                <h1 style="color: var(--primary-color);">{{ course.title }}</h1>
                <p style="line-height: 1.8;">{{ course.description }}</p>
                <div class="product-meta">
                    <div>
                        <strong>قیمت:</strong>
                        <span style="color: var(--primary-color); font-size: 1.5rem;">{{ course.price }} تومان</span>
                    </div>
                    <div>
                        <strong>دسته‌بندی:</strong>
                        <span>{{ course.category.name }}</span>
                    </div>
                </div>
                <a href="#" class="btn btn-primary" style="display: inline-block; margin-top: 1rem;">ثبت‌نام در دوره</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
