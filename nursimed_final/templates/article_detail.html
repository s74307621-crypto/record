<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - نرسیمد</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container nav-container">
            <a href="/" class="logo"><div class="logo-icon">🏥</div><span>نرسیمد</span></a>
            <nav><ul class="nav-menu">
                <li><a href="/" class="nav-link">خانه</a></li>
                <li><a href="/shop" class="nav-link">فروشگاه</a></li>
                <li><a href="/articles" class="nav-link active">مقالات</a></li>
            </ul></nav>
            <div style="display:flex;align-items:center;gap:15px">
                <div class="cart-icon-wrapper"><span class="cart-icon">🛒</span><span class="cart-badge" style="display:none">0</span></div>
                <div class="auth-buttons"><a href="/login" class="btn btn-outline">ورود</a><a href="/register" class="btn btn-primary">ثبت نام</a></div>
            </div>
        </div>
    </header>

    <article class="article-detail">
        <div class="container article-detail-container">
            <img src="{{IMAGE_URL}}" alt="{{TITLE}}" class="article-detail-image">
            <header class="article-detail-header">
                <h1 class="article-detail-title">{{TITLE}}</h1>
                <div class="article-detail-meta">
                    <span>✍️ نویسنده: {{AUTHOR}}</span>
                    <span>📅 تاریخ: {{CREATED_AT}}</span>
                    <span>👁️ بازدید: {{VIEWS}}</span>
                    <span>📂 دسته: {{CATEGORY}}</span>
                </div>
            </header>
            <div class="article-detail-content">
                {{CONTENT}}
            </div>
        </div>
    </article>

    <footer class="footer"><div class="container"><div class="footer-bottom"><p>© ۱۴۰۳ نرسیمد</p></div></div></footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
