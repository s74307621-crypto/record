<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نام - نرسیمد</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container nav-container">
            <a href="/" class="logo"><div class="logo-icon">🏥</div><span>نرسیمد</span></a>
            <nav><ul class="nav-menu">
                <li><a href="/" class="nav-link">خانه</a></li>
                <li><a href="/shop" class="nav-link">فروشگاه</a></li>
                <li><a href="/articles" class="nav-link">مقالات</a></li>
            </ul></nav>
        </div>
    </header>

    <section class="form-section">
        <div class="container">
            <div class="form-container">
                <h2 class="form-title">📝 ثبت نام</h2>
                <p class="form-subtitle">ساخت حساب کاربری جدید</p>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">نام کاربری</label>
                        <input type="text" id="username" class="form-input" placeholder="نام کاربری خود را وارد کنید" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">ایمیل</label>
                        <input type="email" id="email" class="form-input" placeholder="example@gmail.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">رمز عبور</label>
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required minlength="6">
                    </div>
                    
                    <button type="submit" class="btn btn-primary form-btn">ثبت نام</button>
                </form>
                
                <div class="form-footer">
                    قبلاً ثبت نام کرده‌اید؟ <a href="/login">وارد شوید</a>
                </div>
            </div>
        </div>
    </section>

    <div class="toast-container"></div>
    <script src="/static/js/main.js"></script>
</body>
</html>
